# Colima template — applied when creating new instances
# https://github.com/abiosoft/colima/blob/main/docs/CONFIG.md

arch: aarch64
cpu: 2
memory: 4
disk: 200

vmType: vz
mountType: virtiofs

docker:
  registry-mirrors:
    - https://docker.m.daocloud.io
    - https://docker.1ms.run
    - https://docker.nju.edu.cn
  log-opts:
    max-size: "10m"
    max-file: "3"
