[[language]]
name = "go"
language-servers = ["gopls", "golangci-lint-lsp"]

[language-server.golangci-lint-lsp]
command = "golangci-lint-langserver"

[language-server.golangci-lint-lsp.config]
command = [
  "golangci-lint",
  "run",
  "--output.json.path",
  "stdout",
  "--show-stats=false",
  "--issues-exit-code=1",
]

[[language]]
name = "javascript"
formatter = { command = "oxfmt", args = ["--stdin-filepath", "%{buffer_name}"] }

[[language]]
name = "jsx"
formatter = { command = "oxfmt", args = ["--stdin-filepath", "%{buffer_name}"] }

[[language]]
name = "typescript"
formatter = { command = "oxfmt", args = ["--stdin-filepath", "%{buffer_name}"] }

[[language]]
name = "tsx"
formatter = { command = "oxfmt", args = ["--stdin-filepath", "%{buffer_name}"] }

[[language]]
name = "vue"
formatter = { command = "oxfmt", args = ["--stdin-filepath", "%{buffer_name}"] }
language-servers = ["vtsls", "vue-language-server"]

# Language servers.

[language-server.vtsls]
command = "vtsls"
args = ["--stdio"]

[language-server.vtsls.config]
hostInfo = "helix"
vtsls.tsserver.globalPlugins = [
  { name = "@vue/typescript-plugin", location = "~/.bun/install/global/node_modules/@vue/language-server", languages = [
    "vue",
  ], configNamespace = "typescript" },
]

[language-server.vue-language-server]
command = "vue-language-server"
args = ["--stdio"]
